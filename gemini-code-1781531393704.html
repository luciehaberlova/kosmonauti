<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Marketingová výzva</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════
       BARVY A PÍSMA — Minimalistický, světlý a moderní styl
       ═══════════════════════════════════════════════════════════ */
    :root {
      --barva-pozadi:       #FAF8F5;        /* Jemné teplé světlé pozadí */
      --barva-text:         #1A1A1A;        /* Tmavě šedá pro hlavní text */
      --barva-akcent:       #2C3E35;        /* Elegantní hluboká zelená pro akcenty */
      --barva-muted:        #6E6E6E;        /* Tlumená šedá pro doplňkový text */
      --barva-border:       #E5E0DA;        /* Jemná linie pro oddělení patičky */
      --pismo-hlavni:       'Playfair Display', serif;
      --pismo-ui:           'Montserrat', sans-serif;
    }

    /* ═══════════════════════════════════════════════════════════
       ZÁKLADNÍ LAYOUT
       ═══════════════════════════════════════════════════════════ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--barva-pozadi);
      color: var(--barva-text);
      font-family: var(--pismo-ui);
      -webkit-font-smoothing: antialiased;
    }

    .stranka {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 40px;
    }

    .obsah {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ═══════════════════════════════════════════════════════════
       HLAVIČKA
       ═══════════════════════════════════════════════════════════ */
    .hlavicka {
      margin-bottom: 32px;
    }

    .nazev {
      font-family: var(--pismo-hlavni);
      font-size: 28px;
      font-weight: 700;
      color: var(--barva-akcent);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .podtitul {
      font-size: 14px;
      color: var(--barva-muted);
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════════════════════
       KARTA — Automatické přímé zobrazení obsahu
       ═══════════════════════════════════════════════════════════ */
    .karta-wrap {
      width: 100%;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      text-align: left;
    }

    .karta-wrap.je-viditelna {
      opacity: 1;
      transform: translateY(0);
    }

    .karta-nadpis {
      font-family: var(--pismo-hlavni);
      font-size: 22px;
      font-weight: 700;
      color: var(--barva-akcent);
      line-height: 1.3;
      margin-bottom: 20px;
      text-align: center;
    }

    .karta-obrazek {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      display: block;
    }

    .karta-popis {
      font-family: var(--pismo-ui);
      font-size: 15px;
      color: var(--barva-text);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* ═══════════════════════════════════════════════════════════
       BADGE A PATIČKA
       ═══════════════════════════════════════════════════════════ */
    .den-badge {
      display: inline-block;
      background: var(--barva-akcent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .paticka {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--barva-border);
      width: 100%;
      text-align: center;
    }

    .paticka-text {
      font-size: 12px;
      color: var(--barva-muted);
    }
  </style>
</head>

<body>
  <main class="stranka">
    <div class="obsah">

      <div class="hlavicka">
        <h1 class="nazev">Marketingová výzva</h1>
        <p class="podtitul">Váš úkol pro dnešní den</p>
      </div>

      <div class="den-badge" id="denBadge" style="display:none;"></div>

      <div class="karta-wrap" id="kartaWrap">
        <h2 class="karta-nadpis" id="kartaNadpis"></h2>
        <img class="karta-obrazek" id="kartaObrazek" src="" alt="Obrázek k úkolu" style="display:none;" />
        <div class="karta-popis" id="kartaPopis"></div>
      </div>

      <div class="paticka">
        <p class="paticka-text">&copy; 2026 | Vyrobeno pro vaši úspěšnou kampaň</p>
      </div>

    </div>
  </main>

  // ═══════════════════════════════════════════════════════════════════
  //  KÓD APLIKACE (AUTOMATICKÉ NAČTENÍ)
  // ═══════════════════════════════════════════════════════════════════

  function ziskejIndexPodle() {
    var rezim = KONFIGURACE.rezim;
    var karty = KONFIGURACE.karty;

    if (rezim === 'datum') {
      var zacatek = new Date(KONFIGURACE.datum_zacatku);
      var dnes = new Date();
      zacatek.setHours(0,0,0,0);
      dnes.setHours(0,0,0,0);
      var rozdil = Math.floor((dnes - zacatek) / (1000 * 60 * 60 * 24));
      if (rozdil < 0) return { index: -1, typ: 'pred' };
      if (rozdil >= karty.length) return { index: -1, typ: 'po' };
      return { index: rozdil, typ: 'datum', den: rozdil + 1 };
    }
    return { index: Math.floor(Math.random() * karty.length), typ: 'nahodny' };
  }

  function zobrazKartu(index) {
    var karta = KONFIGURACE.karty[index];
    var wrap = document.getElementById('kartaWrap');
    var nadpis = document.getElementById('kartaNadpis');
    var obrazek = document.getElementById('kartaObrazek');
    var popis = document.getElementById('kartaPopis');

    wrap.classList.remove('je-viditelna');

    setTimeout(function() {
      nadpis.textContent = karta.nadpis;

      if (karta.obrazek && karta.obrazek !== '') {
        obrazek.src = karta.obrazek;
        obrazek.style.display = 'block';
      } else {
        obrazek.style.display = 'none';
      }

      popis.innerHTML = karta.popis.replace(/\n/g, '<br>');
      wrap.classList.add('je-viditelna');
    }, 100);
  }

  function nastavKartu() {
    var vysledek = ziskejIndexPodle();
    var denBadge = document.getElementById('denBadge');

    if (vysledek.typ === 'pred') {
      document.getElementById('kartaNadpis').textContent = "Už brzy...";
      document.getElementById('kartaPopis').textContent = KONFIGURACE.text_pred_zacatkem;
      document.getElementById('kartaObrazek').style.display = 'none';
      document.getElementById('kartaWrap').classList.add('je-viditelna');
      return;
    }

    if (vysledek.typ === 'po') {
      document.getElementById('kartaNadpis').textContent = "Konec hry";
      document.getElementById('kartaPopis').textContent = KONFIGURACE.text_po_skonceni;
      document.getElementById('kartaObrazek').style.display = 'none';
      document.getElementById('kartaWrap').classList.add('je-viditelna');
      return;
    }

    if (vysledek.typ === 'datum') {
      denBadge.textContent = 'Úkol ' + vysledek.den + ' z 24';
      denBadge.style.display = 'inline-block';
    }

    zobrazKartu(vysledek.index);
  }

  // Spustit automaticky ihned po načtení stránky
  document.addEventListener('DOMContentLoaded', nastavKartu);
  </script>
