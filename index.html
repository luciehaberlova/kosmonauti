<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kosmonauti 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pozadi: #f4f4f4;
      --text: #273f53;
      --nadpis: #b16e60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--pozadi);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, .karta-text { font-family: 'Libre Baskerville', serif; }
    .stranka {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 24px 48px;
    }
    .obsah {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .nazev {
      font-size: 22px;
      font-weight: 700;
      color: var(--nadpis);
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .podtitul {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .karta {
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      animation: objevSe 0.5s ease 0.2s forwards;
    }
    @keyframes objevSe { to { opacity: 1; transform: translateY(0); } }
    .karta-obrazek {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    .karta-text {
      font-size: 19px;
      font-style: italic;
      line-height: 1.65;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .karta-popisek {
      font-size: 13px;
      opacity: 0.55;
      line-height: 1.6;
      white-space: pre-line;
      text-align: left;
    }
    .paticka {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.1);
      width: 100%;
      font-size: 12px;
      opacity: 0.5;
      line-height: 1.5;
    }
    .paticka a { color: var(--nadpis); text-decoration: none; }
    @media (max-height: 680px) {
      .stranka { padding-top: 24px; }
      .karta-text { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="stranka">
    <div class="obsah">
      <h1 class="nazev">Kosmonauti</h1>
      <p class="podtitul">Odstartuj svou dnešní misi.</p>
      <div class="karta" id="karta">
        <img class="karta-obrazek" id="obrazek" src="" alt="" />
        <p class="karta-text" id="kartaText"></p>
        <p class="karta-popisek" id="kartaPopisek"></p>
      </div>
      <div class="paticka">Ještě nejsme ve spojení? Sleduj mě na <a href="https://www.instagram.com/luciehaberlova.cz/" target="_blank">instagram.com/luciehaberlova.cz</a></div>
    </div>
  </main>
  <script>
  var KARTY = [
    {
      text: "1 nový příspěvek",
      obrazek: "https://drive.google.com/uc?export=view&id=1jR2pbZ8VmExmgwOeVjxsqFQK74zAyU7w",
      popisek: "Úkol je splněný: v okamžiku, kdy ho přidáte na sítě\n\nTento úkol je jednoduchý. Zvolte si síť, na kterou se chcete zaměřit - a přidejte 1 nový příspěvek jakéhokoliv typu. Forma je na vás - grafika, fotografie, text, video..."
    },
    {
      text: "Příspěvek, který vzbudí reakce",
      obrazek: "https://drive.google.com/uc?export=view&id=1m49jA2_wjZixwm32N3kme5doNYXQ4TMw",
      popisek: "Úkol je splněný: když přidáte příspěvek na zvolenou síť\n\nDnes se pokuste vytvořit příspěvek, který získá alespoň 1 reakci - like, srdíčko, komentář, uložení...\n\nCo můžete udělat:\n- zkuste přidat grafiku nebo fotografii, která vyvolá chuť kliknout na like\n- napište něco, s čím se lidé mohou ztotožnit\n- buďte vtipní ve videu nebo dejte nějakou dobrou radu\n- zeptejte se na názor svých sledujících a požádejte je o reakci v komentářích\n\nReakce = engagement. Čím lepší máte engagement, tím lepší vám algoritmus umožní dosahy."
    },
    {
      text: "Navázat kontakt",
      obrazek: "https://drive.google.com/uc?export=view&id=1aGD080Xz4X4_Sy8WPyf7Vcee7r2U_4w3",
      popisek: "Úkol je splněný: jedním komentářem pod účtem někoho, koho zatím nesledujete a on/a nesleduje vás\n\nSociální sítě milují, když se chováte sociálně. Vaším dnešním úkolem je najít alespoň 1 zajímavý účet, se kterým se navzájem ještě nesledujete - a pod některým z příspěvků nechat komentář. Takový, na který se dá dále reagovat nebo který přináší váš vlastní názor/zkušenost k tématu.\n\nJak ji používat naplno vysvětluji v MasterClass Jak zajistit růst publika (nejen) na Instagramu: luciehaberlova.cz/masterclass/"
    },
    {
      text: "Ukažte něco, co lidé rádi vidí",
      obrazek: "https://drive.google.com/uc?export=view&id=1AoARsmTuInXcv9Fd15t26lovRy5aMgu-",
      popisek: "Úkol je splněný: přidáním příspěvku / stories na zvolenou síť\n\nExistuje spousta věcí, které na sítích snadno vzbudí pozitivní reakce - domácí zvířátka, roztomilé děti, veselé oblečení, zajímavá místa...\n\nZkuste dneska odlehčený příspěvek, do kterého vložíte něco, o čem si myslíte, že to vaše sledující bude bavit.\n\nBonusový tip: přidejte k příspěvku vhodný #hashtag (pokud ho síť podporuje)"
    },
    {
      text: "Řekněte, co děláte!",
      obrazek: "https://drive.google.com/uc?export=view&id=1TyKLtSuP1-ZfM7T5xJy_ORNwOxPGdNwe",
      popisek: "Úkol je splněný: přidáním příspěvku na zvolenou síť\n\nNa sítích platí, že když to řeknete jednou, je to stejné, jako byste to neřekli vůbec. Dnes je vaším úkolem se představit a říct, co děláte.\n\nPředstavování vám doporučuji pravidelně opakovat - třeba stylem: \"Vidím tu spoustu nových sledujících, pokud se ještě neznáme, já jsem..., dělám... a můžu vám pomoct s...\"\n\nBonusový úkol: vylaďte si profil."
    },
    {
      text: "Boostněte dosahy",
      obrazek: "https://drive.google.com/uc?export=view&id=1BA1rjOs3PcbHNbr-A5iCI5LWlv6pUWAx",
      popisek: "Úkol je splněný: splněním alespoň jednoho tipu\n\nCo můžete vyzkoušet:\n- Pozvat na svůj účet ty, kdo vás sledují na jiné síti\n- Říct o svém účtu někomu, s kým se osobně potkáte\n- Napsat své e-mailové databázi a ke sledování účtu je pozvat\n- Více navazovat kontakty v rámci sítě\n- Sdílet svůj příspěvek do stories\n- Zaplatit si propagaci příspěvku"
    },
    {
      text: "Napište článek (na blog)",
      obrazek: "https://drive.google.com/uc?export=view&id=1jX49Np1selYaff3u5IoOLKXkQSsiEsdO",
      popisek: "Úkol je splněný: zveřejněním delšího textu na blogu nebo na sítích\n\nZkuste se dnes trochu rozepsat. Pokud máte vlastní web, ráda bych vás nasměrovala k napsání nového článku. Dobře napsané blogové články posilují SEO - což znamená, že vás snadněji najdou vyhledávače.\n\nBonusový tip: informace o novém článku na blogu je fajn rovnou poslat dál dalšími marketingovými kanály."
    },
    {
      text: "Získat 10 nových sledujících",
      obrazek: "https://drive.google.com/uc?export=view&id=1zppHQvBv_1yayBK1Dqj_Yvn5r3fthTL3",
      popisek: "Úkol je splněný: když získáte alespoň jednoho\n\nNajděte způsob, jak počet svých sledujících zvýšit alespoň o 10 nových. Pro splnění úkolu stačí 1 nový sledující.\n\nPokud potřebujete pomoc, rozšiřování publika se věnuje MasterClass Jak zajistit růst publika (nejen) na Instagramu: luciehaberlova.cz/masterclass/"
    },
    {
      text: "Naučte se něco nového - a rovnou to vyzkoušejte",
      obrazek: "https://drive.google.com/uc?export=view&id=1610iEasr-6v0tF8UnyUu26bakZKQW1gz",
      popisek: "Úkol je splněný: v okamžiku, kdy novou techniku či poznatek aplikujete\n\nNajděte 1 novou informaci o tom, co můžete na sítích dělat - a rovnou to udělejte. Je na vás, jestli najdete zajímavý článek, podíváte se na nějaký kurz či Youtube video - nebo jen najdete zajímavý účet s radami.\n\nDo prostoru pro splněné úkoly napište, co jste udělali - a přidejte odkaz na inspiraci."
    },
    {
      text: "Ukažte se!",
      obrazek: "https://drive.google.com/uc?export=view&id=1jzxXtMhgT_-PKY9a5ytTMJ1IE6VcuqcP",
      popisek: "Úkol je splněný: když se na sítích objevíte vy sami\n\nLidé chtějí vědět, s kým mají tu čest. A chtějí vás vidět. Cvaknout selfiečko, natočit krátké video - nebo alespoň vytáhnout svoji nejlepší fotku.\n\nNemáte fotky, se kterými jste spokojení? Klidně je dávejte jen do stories, které po 24 hodinách zmizí. Časem si na to zvyknete."
    },
    {
      text: "Mrkněte na čísla",
      obrazek: "https://drive.google.com/uc?export=view&id=19mXqzkS9Nzbs15nY9RpNCRqRMHVlxoBU",
      popisek: "Úkol je splněný: jakýmkoliv screenshotem s dosahy, návštěvností nebo jinou metrikou\n\nVětšina sítí vám umožní sledovat, jak si vaše příspěvky vedou. Podívejte se, jak vám roste sledovanost, jaké máte dosahy - a které příspěvky si dosud vedly nejlépe.\n\nDo komentářů stačí přidat 1 screenshot s čísly."
    },
    {
      text: "Pošlete newsletter",
      obrazek: "https://drive.google.com/uc?export=view&id=1S2Tj_2yEYs8Wt2LI_Rh0IPN847776xea",
      popisek: "Úkol je splněný: odeslaným newsletterem\n\nE-mailing je pořád nejlepším prodejním nástrojem z hlediska poměru cena/výkon. Pokud už svou databázi kontaktů máte, dnes je čas napsat e-mail. Téma je úplně na vás.\n\nJeště databázi nemáte? Doporučuji MailerLite - základní účet je zdarma."
    },
    {
      text: "Natočte video na sociální sítě",
      obrazek: "https://drive.google.com/uc?export=view&id=1flZhW9Y1A6ly_I6j2HbWmyx4aaQ2aEEN",
      popisek: "Úkol je splněný: když to alespoň zkusíte (i bez zveřejnění)\n\nVidea na sítích fungují - zejména ta krátká teď podporuje naprostá většina hlavních sítí.\n\nPokud jste zatím nikdy video na sítě nenatáčeli, váš úkol je to alespoň zkusit. Nemusíte ho zveřejňovat, pokud z něj nebudete mít dobrý pocit."
    },
    {
      text: "Sdílejte dobrou radu nebo tip",
      obrazek: "https://drive.google.com/uc?export=view&id=1GRtKS4LClCD_eSG_No603LZuIFAnkkWv",
      popisek: "Úkol je splněný: sdílením příspěvku nebo stories\n\nSdílení rad a tipů je skvělý způsob, jak si upevnit pozici člověka znalého v oboru. Vytáhněte z klobouku jednu dobrou radu - něco, na co se vás lidé často ptají, co polovina vašich klientů dělá špatně, nebo co by měl o vašem oboru vědět úplně každý.\n\nFantazii se meze nekladou."
    },
    {
      text: "Zkuste něco prodat",
      obrazek: "https://drive.google.com/uc?export=view&id=1GO-X6DfZ2VpwUWBLzw0Wl00L1A-jQ_l_",
      popisek: "Úkol je splněný: zveřejněním nabídky\n\nMarketing je o tom, že jste vidět - a že na tom dokážete dlouhodobě vydělávat. Pojďte si dnes vyzkoušet prodejní příspěvek - v libovolném formátu.\n\nNic neprodáváte? Zkuste prodat sami sebe - napište alespoň jeden důvod, proč by lidé měli sledovat právě vás."
    },
    {
      text: "Výstup z komfortní zóny",
      obrazek: "https://drive.google.com/uc?export=view&id=1xglSWSkV_bKOQBVeHVHL9oET4seXo0R-",
      popisek: "Úkol je splněný: když to jakýmkoliv způsobem uděláte\n\nČas na chvíli opustit bezpečí rakety! Udělejte něco, do čeho se vám nechce - zkuste živé vysílání, nechte se přizvat k rozhovoru, natočte video na TikTok.\n\nZázraky začínají tam, kde komfortní zóna končí. Překračujte svoje hranice, ať jsou kdekoliv."
    },
    {
      text: "Inspirujte!",
      obrazek: "https://drive.google.com/uc?export=view&id=1SJm-lrRfsOq0wZxff5j-90_JgiJ0Kq9V",
      popisek: "Úkol je splněný: nasdílením příspěvku / stories o jiném účtu či autorovi\n\nŘekněte svým sledujícím, kdo vás inspiruje. Přesdílejte do stories cizí příspěvek a řekněte, proč právě ten. Nasdílejte blog zajímavého autora. Napište příspěvek o knize, kterou doporučujete.\n\nPodělte se o inspiraci a podpořte někoho, koho sledujete."
    },
    {
      text: "Ukažte se jako profík",
      obrazek: "https://drive.google.com/uc?export=view&id=1HtAF5-ufxKr63JZ5cDeppgEWm0J_ZMEp",
      popisek: "Úkol je splněný: zveřejněním příspěvku\n\nPředstavte svým sledujícím něco, co zvládáte levou zadní. Pochlubte se poslední zakázkou. Vyfoťte svůj produkt. Mluvte o něčem, co ostatní neumí, ale vy to děláte denně.\n\nForma příspěvku je úplně na vás."
    },
    {
      text: "Co dělám a co nedělám",
      obrazek: "https://drive.google.com/uc?export=view&id=1jP-GDzTQx-Hlav5AjMSO5Kx1zqChswoG",
      popisek: "Úkol je splněný: zveřejněním příspěvku\n\nDejte nám trochu nahlédnout pod pokličku toho, co k vaší práci patří. Napište, co děláte vy sami - a kde vám pomáhají další lidé.\n\nForma je zcela na vás - od videa ve stories až po foto celého firemního týmu na LinkedInu."
    },
    {
      text: "Vaše superschopnost",
      obrazek: "https://drive.google.com/uc?export=view&id=1i4dOOKSASnaFUH6EXQPdqHlE-gkJ6SP_",
      popisek: "Úkol je splněný: zveřejněním příspěvku\n\nJste superhrdina/superhrdinka. Co je vaše superschopnost?\n\nBuďte vážní nebo buďte vtipní. Sítě jsou hra - vyzkoušejte si, jaká poloha vám sedí.\n\nForma je libovolná - příspěvek, video, stories..."
    },
    {
      text: "Cíl pro váš marketing",
      obrazek: "https://drive.google.com/uc?export=view&id=10HJY_GpRjUBvJ-feU3mfemZ-JXpuE61A",
      popisek: "Úkol je splněný: když si napíšete alespoň 1 cíl\n\nVezměte si tužku a papír - a napište si, kde se svým marketingem chcete být za 3 měsíce.\n\nZamyslete se nad: kterými sítěmi, jak moc, na kolik sledujících, jaké další kanály, reklama, co prodávat.\n\nPsané plány se naplní mnohem spíše, než ty v hlavě."
    },
    {
      text: "Já a já",
      obrazek: "https://drive.google.com/uc?export=view&id=1QJOlYFpiLrecJHQpxcJov7SEksDzd4h9",
      popisek: "Úkol je splněný: zveřejněním příspěvku\n\nPochlubte se něčím, co o vás vaše publikum neví - nebo co by od vás vůbec nečekalo. Buďte osobní, klidně zcela nebyznysoví a neformální.\n\nCo o vás vaši sledující nevědí - a bavilo by je to vědět?"
    },
    {
      text: "1 věc",
      obrazek: "https://drive.google.com/uc?export=view&id=1_qKbyTMTwC4WIsHy2qGrB9F8fQD8P1BM",
      popisek: "Úkol je splněný: zveřejněním příspěvku\n\nVymyslete jedno téma, které svým sledujícím potřebujete pravidelně ukazovat - a na které se zatím nedostalo. A rovnou přidejte první příspěvek.\n\nPokud potřebujete své obsahové pilíře objevit: luciehaberlova.cz/masterclass/"
    },
    {
      text: "Dárek",
      obrazek: "https://drive.google.com/uc?export=view&id=1Oqgmx50-Sw-hb6ziXCQIB3KYvyMdX862",
      popisek: "Úkol je splněný: zveřejněním příspěvku nebo jiné zvolené formy\n\nPojďte svým klientům nadělit dárek. Dejte jim jednu dobrou radu nebo tip, který jste zdarma ještě nikdy nikomu nedali. Nebo jim pošlete překvapení - přístup ke kurzu zdarma, sadu šablon v Canvě...\n\nBuďte kreativní a zkuste si s tím trochu hrát."
    }
  ];

  function zobrazKartu(karta) {
    var ob = document.getElementById('obrazek');
    if (karta.obrazek) {
      ob.src = karta.obrazek;
      ob.alt = karta.text;
      ob.style.display = 'block';
    } else {
      ob.style.display = 'none';
    }
    document.getElementById('kartaText').textContent = karta.text;
    document.getElementById('kartaPopisek').textContent = karta.popisek || '';
  }

  document.addEventListener('DOMContentLoaded', function() {
    var idx = Math.floor(Math.random() * KARTY.length);
    zobrazKartu(KARTY[idx]);
  });
  </script>
</body>
</html>
