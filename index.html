<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kosmonauti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pozadi:  #f4f4f4;
      --text:    #273f53;
      --nadpis:  #b16e60;
      --pismo:   'Libre Franklin', serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--pozadi);
      color: var(--text);
      font-family: var(--pismo);
      -webkit-font-smoothing: antialiased;
    }
    body {
      font-family: 'Libre Franklin', sans-serif;
    }
    h1, h2, h3, .nazev, .karta-text {
      font-family: 'Libre Baskerville', serif;
    }
    .stranka {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 24px 48px;
    }
    .obsah {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .nazev {
      font-size: 22px;
      font-weight: 700;
      color: var(--nadpis);
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .podtitul {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .den-badge {
      display: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--nadpis);
      opacity: 0.7;
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .karta {
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      animation: objevSe 0.5s ease 0.2s forwards;
    }
    @keyframes objevSe {
      to { opacity: 1; transform: translateY(0); }
    }
    .karta-obrazek {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    .karta-text {
      font-size: 19px;
      font-style: italic;
      line-height: 1.65;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .karta-popisek {
      font-size: 13px;
      opacity: 0.55;
      line-height: 1.5;
      white-space: pre-line;
    }
    .paticka {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.1);
      width: 100%;
      font-size: 12px;
      opacity: 0.5;
      line-height: 1.5;
    }
    .paticka a { color: var(--nadpis); text-decoration: none; }
    @media (max-height: 680px) {
      .stranka { padding-top: 24px; }
      .karta-text { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="stranka">
    <div class="obsah">
      <h1 class="nazev">Kosmonauti</h1>
      <p class="podtitul">Odstartuj svou dnešní misi.</p>
      <p class="den-badge" id="denBadge"></p>
      <div class="karta" id="karta">
        <img class="karta-obrazek" id="obrazek" src="" alt="" />
        <p class="karta-text" id="kartaText"></p>
        <p class="karta-popisek" id="kartaPopisek"></p>
      </div>
      <div class="paticka">Ještě nejsme ve spojení? Sleduj mě na <a href="https://www.instagram.com/luciehaberlova.cz/" target="_blank">https://www.instagram.com/luciehaberlova.cz/</a></div>
    </div>
  </main>
